name: Update README with latest Substack posts
on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://theshallowstate.substack.com/feed"
          max_post_count: 3
